name: pr-validate
on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/**"
      - "schema/**"
      - "tools/**"
      - ".github/workflows/pr-validate.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # pin by SHA in M6
        with:
          fetch-depth: 0
      - uses: SwiftyLab/setup-swift@v1 # pin by SHA in M6
        with:
          swift-version: "6.1"
      - name: Build tools
        run: swift build --package-path tools -c release
      - name: Validate schemas
        id: schema
        run: |
          ./tools/.build/release/catalog-validate ./data/cameras \
              --schema ./schema/camera.schema.json \
              --report-format=github
      - name: Canonical-JSON round-trip
        id: roundtrip
        run: |
          ./tools/.build/release/catalog-build \
              --in ./data/cameras --out ./dist/_check --no-sign
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          src_dir = Path('./data/cameras')
          gen_dir = Path('./dist/_check/cameras')

          src_files = sorted(p.name for p in src_dir.glob('*.json'))
          gen_files = sorted(p.name for p in gen_dir.glob('*.json'))

          ok = True

          if src_files != gen_files:
            missing_in_generated = sorted(set(src_files) - set(gen_files))
            extra_in_generated = sorted(set(gen_files) - set(src_files))

            if missing_in_generated:
              print('Missing generated files:')
              for name in missing_in_generated:
                print(f'  - {name}')

            if extra_in_generated:
              print('Unexpected generated files:')
              for name in extra_in_generated:
                print(f'  - {name}')

            ok = False

          for name in sorted(set(src_files) & set(gen_files)):
            src_obj = json.loads((src_dir / name).read_text(encoding='utf-8'))
            gen_obj = json.loads((gen_dir / name).read_text(encoding='utf-8'))
            if src_obj != gen_obj:
              print(f'Semantic JSON mismatch: {name}')
              ok = False

          if not ok:
            sys.exit(1)

          print(f'Round-trip semantic equivalence OK for {len(src_files)} file(s).')
          PY
      - name: Generate PR summary
        if: always()
        run: |
          mkdir -p ./dist/_check
          {
            echo "### Validation report"
            echo ""
            if [ "${{ steps.schema.outcome }}" = "success" ]; then
              echo "✅ Schema validation passed"
            else
              echo "❌ Schema validation failed — see annotations above"
            fi
            echo ""
            if [ "${{ steps.roundtrip.outcome }}" = "success" ]; then
              echo "✅ Canonical-JSON round-trip clean"
            elif [ "${{ steps.roundtrip.outcome }}" = "failure" ]; then
              echo "❌ Canonical-JSON round-trip detected differences"
            else
              echo "⏭️ Canonical-JSON round-trip skipped"
            fi
            echo ""
            echo "Note: round-trip compares semantic JSON content; formatting and key-order differences are ignored."
          } > ./dist/_check/summary.md
      - name: Comment diff summary
        if: always()
        uses: actions/github-script@v7 # pin by SHA in M6
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('./dist/_check/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
