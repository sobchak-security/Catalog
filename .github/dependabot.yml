version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    labels: [ci, dependencies]
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: swift
    directory: "/tools"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    labels: [tooling, dependencies]
